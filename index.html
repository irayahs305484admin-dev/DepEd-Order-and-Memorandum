<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DepEd Orders & Memoranda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        deped: {
                            blue: '#0038A8',
                            red: '#CE1126',
                            light: '#F0F4F8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .tab-active {
            border-bottom: 2px solid #0038A8;
            color: #0038A8;
            font-weight: 600;
        }
        .tab-inactive {
            color: #64748b;
            border-bottom: 2px solid transparent;
        }
        .tab-inactive:hover {
            color: #334155;
            border-bottom: 2px solid #cbd5e1;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen">

    <header class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-deped-blue rounded-full flex items-center justify-center text-white font-bold shadow-md">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 leading-tight">DepEd Issuances</h1>
                    <p class="text-xs text-gray-500">Orders & Memoranda Explorer</p>
                </div>
            </div>
            <button id="syncBtn" class="flex items-center space-x-2 text-sm text-deped-blue bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-deped-blue">
                <i id="syncIcon" class="fa-solid fa-rotate"></i>
                <span class="hidden sm:inline font-medium">Sync Data</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Search Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-6">
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-search text-gray-400"></i>
                </div>
                <input type="text" id="searchInput" 
                    class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-2 focus:ring-deped-blue focus:border-deped-blue sm:text-sm transition-shadow" 
                    placeholder="Search by Number and Year (e.g., '01 2026' or '024 2025')">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">Format: No + Year</span>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="border-b border-gray-200 mb-6 flex space-x-8">
            <button id="tabOrders" class="pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-active focus:outline-none" onclick="switchTab('orders')">
                <i class="fa-solid fa-file-contract mr-2"></i>DepEd Orders
            </button>
            <button id="tabMemos" class="pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-inactive focus:outline-none" onclick="switchTab('memoranda')">
                <i class="fa-solid fa-file-lines mr-2"></i>DepEd Memoranda
            </button>
        </div>

        <!-- List Container -->
        <div id="listContainer" class="space-y-4">
            <!-- Items will be injected here via JavaScript -->
        </div>

        <!-- Pagination Controls -->
        <div id="paginationControls" class="flex justify-between items-center mt-8 hidden">
            <button id="prevPageBtn" class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm" onclick="changePage(-1)">
                <i class="fa-solid fa-chevron-left mr-2"></i> Previous
            </button>
            <span id="pageIndicator" class="text-sm font-medium text-gray-700 bg-gray-100 border border-gray-200 px-4 py-1.5 rounded-full shadow-inner">Page 1</span>
            <button id="nextPageBtn" class="px-4 py-2 text-sm font-medium text-white bg-deped-blue rounded-md hover:bg-blue-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-sm" onclick="changePage(1)">
                Next Page <i class="fa-solid fa-chevron-right ml-2"></i>
            </button>
        </div>
        
        <!-- Empty State (Hidden by default) -->
        <div id="emptyState" class="hidden text-center py-12">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 text-gray-400 mb-4">
                <i class="fa-solid fa-folder-open text-2xl"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-900">No issuances found</h3>
            <p class="text-sm text-gray-500 mt-1">Try adjusting your search criteria (Number and Year).</p>
        </div>

    </main>

    <script>
        // CONFIGURATION
        // Once you deploy the Google Apps Script, paste the Web App URL here.
        // If blank, the app will use the mock data provided below.
        const GOOGLE_APPS_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbzWrAm7kaY63c5HUrXlNDldZq4VnxWF-g1rCxum7cLU9zY5UsnbtPh7sv95yfN-Xpy_/exec"; 

        // State Management
        let currentTab = 'orders';
        let searchQuery = '';
        let issuancesData = [];
        let currentPage = 1;

        // Mock Data for demonstration (Used if API is not yet set up or offline)
        const mockData = [
            { type: 'orders', num: '017', year: '2026', title: 'Implementation of the Latest Basic Education Curriculum', date: 'Jun 06, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'orders', num: '016', year: '2026', title: 'Updated Guidelines for the School Year 2026-2027', date: 'May 12, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'orders', num: '015', year: '2026', title: 'National Guidelines on the Safe Return to Schools', date: 'Apr 28, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'orders', num: '014', year: '2026', title: 'Policies on the Procurement of Educational Materials', date: 'Mar 15, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'orders', num: '001', year: '2026', title: 'Implementation of the Revised Basic Education Curriculum', date: 'Jan 05, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'orders', num: '002', year: '2024', title: 'Immediate Removal of Administrative Tasks of Public School Teachers', date: 'Jan 26, 2024', url: 'https://www.deped.gov.ph/wp-content/uploads/DO_s2024_002.pdf' },
            { type: 'orders', num: '022', year: '2023', title: 'Implementing Guidelines on the School Calendar and Activities for the School Year 2023-2024', date: 'Aug 04, 2023', url: 'https://www.deped.gov.ph/' },
            { type: 'memoranda', num: '014', year: '2026', title: '2026 National Schools Press Conference Guidelines', date: 'Mar 15, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'memoranda', num: '013', year: '2026', title: 'Conduct of the 2026 Palarong Pambansa', date: 'Feb 20, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'memoranda', num: '001', year: '2026', title: 'Celebration of the 2026 National Dental Health Month', date: 'Jan 10, 2026', url: 'https://www.deped.gov.ph/' },
            { type: 'memoranda', num: '003', year: '2024', title: 'Administration of the Early Childhood Development (ECD) Checklist', date: 'Feb 15, 2024', url: 'https://www.deped.gov.ph/' }
        ];

        // Initialize App
        async function init() {
            await fetchIssuances(currentPage);
            setupEventListeners();
        }

        // Fetch Data from Google Apps Script (or load mock data)
        async function fetchIssuances(page = 1) {
            setLoading(true);
            try {
                if (GOOGLE_APPS_SCRIPT_API_URL !== "") {
                    // Real API Fetch with redirect following for Google Apps Script compatibility
                    const separator = GOOGLE_APPS_SCRIPT_API_URL.includes('?') ? '&' : '?';
                    const response = await fetch(`${GOOGLE_APPS_SCRIPT_API_URL}${separator}page=${page}`, { redirect: "follow" });
                    const data = await response.json();
                    if (data && data.length > 0) {
                        issuancesData = data;
                    } else {
                        throw new Error("Empty data returned from GAS API");
                    }
                } else {
                    throw new Error("GAS API URL is empty");
                }
            } catch (error) {
                console.warn("GAS fetch failed or empty, using direct RSS proxy fallback...", error);
                try {
                    // Direct fallback so the app ALWAYS works even if GAS is down/unconfigured
                    const ordersRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.deped.gov.ph/category/issuances/deped-orders/feed/?paged=' + page)}`);
                    const memosRes = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.deped.gov.ph/category/issuances/deped-memoranda/feed/?paged=' + page)}`);
                    
                    const ordersData = await ordersRes.json();
                    const memosData = await memosRes.json();
                    
                    const formatDirectData = (data, type) => {
                        if(data.status !== 'ok') return [];
                        return data.items.map(item => {
                             let num = "0";
                             let year = new Date(item.pubDate.replace(/-/g, '/')).getFullYear().toString();
                             
                             // Capture exact number keeping leading zeros
                             const titleRegex = /(?:DO|DM|Order|Memo).*?(?:No\.?)?\s*(\d+)[A-Za-z]?,\s*s\.\s*(\d{4})/i;
                             const parsedTitle = item.title.match(titleRegex);
                             if (parsedTitle) {
                                num = parsedTitle[1];
                                year = parsedTitle[2];
                             } else {
                                const yearMatch = item.title.match(/\b(20\d{2})\b/);
                                if (yearMatch) year = yearMatch[1];
                                const numMatch = item.title.match(/\b(\d+)\b/);
                                if (numMatch) num = numMatch[1];
                             }
                             
                             const d = new Date(item.pubDate.replace(/-/g, '/'));
                             const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
                             return {
                                 type: type,
                                 num: num,
                                 year: year,
                                 title: item.title.replace(/&#8211;/g, '-').replace(/&#8217;/g, "'").replace(/&amp;/g, '&'),
                                 date: dateStr,
                                 timestamp: d.getTime(),
                                 url: item.link
                             };
                        });
                    };
                    
                    const fetchedDirectly = [...formatDirectData(ordersData, 'orders'), ...formatDirectData(memosData, 'memoranda')];
                    if (fetchedDirectly.length > 0) {
                        issuancesData = fetchedDirectly;
                    } else {
                        issuancesData = mockData;
                    }
                } catch(fallbackErr) {
                    console.error("All fetches failed", fallbackErr);
                    issuancesData = mockData; // Ultimate fallback
                }
            } finally {
                // FORCE STRICT DESCENDING ORDER BY YEAR THEN NUMBER
                issuancesData.sort((a, b) => {
                    // 1. Primary Sort: Year (Highest/Newest Year First)
                    const yearA = parseInt(a.year) || 0;
                    const yearB = parseInt(b.year) || 0;
                    if (yearB !== yearA) {
                        return yearB - yearA;
                    }
                    
                    // 2. Secondary Sort: Issuance Number (Highest Number First)
                    // We extract just the digits in case the number has a letter (e.g. "17A")
                    const numA = parseInt(a.num.replace(/\D/g, '') || '0');
                    const numB = parseInt(b.num.replace(/\D/g, '') || '0');
                    if (numB !== numA) {
                        return numB - numA;
                    }
                    
                    // 3. Tertiary Sort: Exact Timestamp (Only used if two files have the exact same number and year)
                    const timeA = a.timestamp || new Date(a.date).getTime();
                    const timeB = b.timestamp || new Date(b.date).getTime();
                    return timeB - timeA;
                });

                renderList();
                setLoading(false);
            }
        }

        // Setup Event Listeners
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderList();
            });

            document.getElementById('syncBtn').addEventListener('click', () => {
                currentPage = 1;
                fetchIssuances(currentPage);
            });
        }

        // Handle Pagination clicks
        async function changePage(offset) {
            const newPage = currentPage + offset;
            if (newPage > 0) {
                currentPage = newPage;
                await fetchIssuances(currentPage);
                // Smooth scroll back to top of the list after loading
                document.getElementById('searchInput').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // Tab Switching Logic
        function switchTab(tabName) {
            currentTab = tabName;
            
            // Update Tab UI
            const tabOrders = document.getElementById('tabOrders');
            const tabMemos = document.getElementById('tabMemos');

            if (tabName === 'orders') {
                tabOrders.className = 'pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-active focus:outline-none';
                tabMemos.className = 'pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-inactive focus:outline-none';
            } else {
                tabMemos.className = 'pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-active focus:outline-none';
                tabOrders.className = 'pb-3 px-1 text-sm font-medium transition-colors duration-200 tab-inactive focus:outline-none';
            }

            renderList();
        }

        // Render List based on current tab and search query
        function renderList() {
            const container = document.getElementById('listContainer');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            // Filter by Tab
            let filteredData = issuancesData.filter(item => item.type === currentTab);

            // Filter by Search (Number and Year)
            // Expecting input like "001 2024" or "2024 001" or just "2024" or "001"
            if (searchQuery) {
                const searchTerms = searchQuery.split(' ').filter(term => term.length > 0);
                
                filteredData = filteredData.filter(item => {
                    // Check if EVERY search term is found in either the number or the year
                    return searchTerms.every(term => {
                        // Strip leading zeros for a safer comparison (e.g., '007' becomes '7')
                        const itemNumClean = item.num.replace(/^0+/, '') || '0';
                        const termClean = term.replace(/^0+/, '') || '0';
                        
                        return item.num.includes(term) || 
                               item.year.includes(term) || 
                               itemNumClean === termClean;
                    });
                });
            }

            // Display Results or Empty State
            const paginationControls = document.getElementById('paginationControls');

            if (filteredData.length === 0) {
                container.classList.add('hidden');
                if (paginationControls) paginationControls.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                container.classList.remove('hidden');

                // Pagination visibility logic
                if (paginationControls) {
                    if (searchQuery) {
                        // Hide pagination when searching, since search only filters current page
                        paginationControls.classList.add('hidden');
                    } else {
                        paginationControls.classList.remove('hidden');
                        document.getElementById('pageIndicator').innerText = `Page ${currentPage}`;
                        document.getElementById('prevPageBtn').disabled = currentPage === 1;
                        // If we received very few items, assume we've hit the oldest available page
                        document.getElementById('nextPageBtn').disabled = filteredData.length < 5; 
                    }
                }

                filteredData.forEach(item => {
                    const prefix = item.type === 'orders' ? 'DO' : 'DM';
                    const formatTitle = `${prefix} ${item.num}, s. ${item.year}`;
                    const iconColor = item.type === 'orders' ? 'text-blue-600 bg-blue-100' : 'text-amber-600 bg-amber-100';

                    const card = document.createElement('div');
                    card.className = 'bg-white border border-gray-200 rounded-xl p-5 hover:shadow-md transition-shadow duration-200 group flex items-start space-x-4';
                    card.innerHTML = `
                        <div class="flex-shrink-0 w-12 h-12 rounded-lg flex items-center justify-center ${iconColor}">
                            <i class="fa-solid fa-file-pdf text-xl"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between mb-1">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                                    ${formatTitle}
                                </span>
                                <span class="text-xs text-gray-500 whitespace-nowrap"><i class="fa-regular fa-calendar mr-1"></i>${item.date}</span>
                            </div>
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                               class="text-base font-semibold text-gray-900 group-hover:text-deped-blue transition-colors line-clamp-2 mt-1">
                               ${item.title} <i class="fa-solid fa-arrow-up-right-from-square text-xs ml-1 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                            </a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        // Loading State UI update
        function setLoading(isLoading) {
            const syncIcon = document.getElementById('syncIcon');
            const syncBtn = document.getElementById('syncBtn');
            if (isLoading) {
                syncIcon.classList.add('fa-spin');
                syncBtn.classList.add('opacity-75', 'cursor-not-allowed');
            } else {
                syncIcon.classList.remove('fa-spin');
                syncBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // Run on load
        window.onload = init;
    </script>
</body>
</html>
